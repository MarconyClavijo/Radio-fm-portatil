<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121315">
  <title>Radio FM Portátil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Contenedor Inteligente que se centra en PC y Celular -->
  <div class="main-container">
    
    <!-- Fila Superior: Título y Bocina de Mute -->
    <div class="top-bar">
      <span class="app-title">FM Radio</span>
      <button class="top-btn" id="mute-top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>
      </button>
    </div>

    <!-- Fila Digital: Flechas, Estrella y Frecuencia -->
    <div class="display-container">
      <button class="nav-arrow" id="prev">I◄</button>
      <div class="freq-box">
        <button class="fav-star-btn" id="star-toggle">☆</button>
        <span class="freq-number" id="frequency">87.5</span>
        <span class="freq-unit">MHz</span>
      </div>
      <button class="nav-arrow" id="next">►I</button>
    </div>

    <!-- Fila de Texto: Nombre de la Emisora Activa -->
    <div class="station-name" id="station">Buscando señal...</div>

    <!-- El Gran Dial Circular Analógico (Centro Perfecto) -->
    <div class="tuner-outer-circle">
      <div class="tuner-needle" id="needle"></div>
      <div class="dial-scale">
        <span class="dial-num num-86">86</span>
        <span class="dial-num num-88">88</span>
        <span class="dial-num num-90">90</span>
        <span class="dial-num num-92">92</span>
        <span class="dial-num num-94">94</span>
        <span class="dial-num num-96">96</span>
        <span class="dial-num num-98">98</span>
        <span class="dial-num num-100">100</span>
        <span class="dial-num num-102">102</span>
        <span class="dial-num num-104">104</span>
        <span class="dial-num num-106">106</span>
        <span class="dial-num num-108">108</span>
      </div>
      <div class="tuner-inner-circle">
        <button class="power-center-btn" id="power">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v10" /><path d="M18.4 6.6a9 9 0 1 1-12.77.04" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Fila de Volumen Inferior Centrada -->
    <div class="volume-row">
      <button class="vol-btn" id="vol-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
      <div class="status-text" id="status"></div>
    </div>

    <!-- Rejilla Inferior de Estaciones Favoritas -->
    <div class="favorites-grid">
      <div class="fav-box" data-index="0"><span class="fav-num">01</span><span class="fav-plus">+</span></div>
      <div class="fav-box" data-index="1"><span class="fav-num">02</span><span class="fav-plus">+</span></div>
      <div class="fav-box" data-index="2"><span class="fav-num">03</span><span class="fav-plus">+</span></div>
      <div class="fav-box" data-index="3"><span class="fav-num">04</span><span class="fav-plus">+</span></div>
      <div class="fav-box" data-index="4"><span class="fav-num">05</span><span class="fav-plus">+</span></div>
      <div class="fav-box" data-index="5"><span class="fav-num">06</span><span class="fav-plus">+</span></div>
    </div>

  </div>

  <audio id="audio" crossorigin="anonymous" preload="none"></audio>
  <script src="script.js"></script>
</body>
</html>
